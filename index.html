<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HBD FRND🎉</title>
  <style>
    body {
      margin: 0;
      font-family: 'Comic Sans MS', cursive;
      text-align: center;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: white;
    }

    button {
      padding: 20px 40px;
      font-size: 22px;
      border: none;
      border-radius: 15px;
      background: white;
      color: #ff4d6d;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
    }

    #page1, #page2 {
      display: none;
    }

    .heart {
      position: absolute;
      font-size: 20px;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh); }
      100% { transform: translateY(-10vh); }
    }
  </style>
</head>
<body>

<!-- PAGE 1 -->
<div id="page1">
  <button onclick="goToPage2()">Hey! Thripura...Click me… ❤️</button>
</div>

<!-- PAGE 2 -->
<div id="page2">
  <h1>👀 Ready for next level?</h1>
  <button onclick="goToFinal()">Click for real surprise 🎁</button>
</div>

<script>
  // show first page
  document.getElementById("page1").style.display = "block";

  function goToPage2() {
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "block";
    createHearts();
  }

  function goToFinal() {
    window.location.href = "bday.html"; // 🔥 opens your main surprise page
  }

  function createHearts() {
    for (let i = 0; i < 30; i++) {
      let heart = document.createElement("div");
      heart.innerHTML = "❤️";
      heart.className = "heart";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
      document.body.appendChild(heart);
    }
  }
</script>

</body>
</html>
